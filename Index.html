<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tobi's Essensplan</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap');

:root {
–bg: #0f0f0f;
–surface: #1a1a1a;
–border: #2a2a2a;
–accent: #c8f55a;
–accent2: #f5a623;
–text: #e8e8e8;
–muted: #666;
–training: #1e2a0f;
–training-border: #4a7a10;
–normal: #1a1a2e;
–normal-border: #3a3a6e;
}

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘DM Mono’, monospace;
min-height: 100vh;
padding: 24px 16px;
}

header { text-align: center; margin-bottom: 28px; }

header h1 {
font-family: ‘Syne’, sans-serif;
font-size: clamp(28px, 6vw, 48px);
font-weight: 800;
color: var(–accent);
letter-spacing: -1px;
line-height: 1;
}

header p { color: var(–muted); font-size: 11px; margin-top: 6px; letter-spacing: 2px; text-transform: uppercase; }

.week-nav {
display: flex; align-items: center; justify-content: center;
gap: 16px; margin-bottom: 20px;
}

.week-nav button {
background: var(–surface); border: 1px solid var(–border);
color: var(–text); padding: 8px 16px;
font-family: ‘DM Mono’, monospace; font-size: 12px; cursor: pointer; transition: all 0.15s;
}
.week-nav button:hover { border-color: var(–accent); color: var(–accent); }

.week-label {
font-family: ‘Syne’, sans-serif; font-weight: 700; font-size: 14px;
color: var(–accent2); letter-spacing: 1px; min-width: 200px; text-align: center;
}

.actions { display: flex; gap: 10px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap; }

.btn {
background: transparent; border: 1px solid var(–border); color: var(–muted);
padding: 8px 18px; font-family: ‘DM Mono’, monospace; font-size: 11px;
cursor: pointer; letter-spacing: 1px; text-transform: uppercase; transition: all 0.15s;
}
.btn:hover { border-color: var(–accent); color: var(–accent); }
.btn.primary { background: var(–accent); border-color: var(–accent); color: #0f0f0f; font-weight: 500; }
.btn.primary:hover { background: #b8e84a; }

.legend {
display: flex; gap: 20px; justify-content: center;
margin-bottom: 20px; flex-wrap: wrap;
}
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(–muted); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }
.dot-training { background: #4a7a10; }
.dot-normal { background: #3a3a6e; }

.grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
gap: 12px;
max-width: 1200px;
margin: 0 auto;
}

.day-card {
border: 1px solid var(–border);
background: var(–surface);
padding: 16px;
}

.day-card.training { background: var(–training); border-color: var(–training-border); }
.day-card.normal { background: var(–normal); border-color: var(–normal-border); }

.day-header {
display: flex; align-items: baseline; gap: 10px;
margin-bottom: 14px; padding-bottom: 10px;
border-bottom: 1px solid rgba(255,255,255,0.06);
}

.day-name { font-family: ‘Syne’, sans-serif; font-weight: 800; font-size: 20px; color: var(–text); }
.day-date { font-size: 11px; color: var(–muted); }

.day-badge {
margin-left: auto; font-size: 9px; letter-spacing: 1.5px;
text-transform: uppercase; padding: 3px 8px; border-radius: 2px;
}
.badge-training { background: rgba(74,122,16,0.3); color: #8fcc30; border: 1px solid var(–training-border); }
.badge-normal { background: rgba(58,58,110,0.4); color: #8888cc; border: 1px solid var(–normal-border); }

.meal-slot { margin-bottom: 12px; }

.meal-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }

.meal-time { font-size: 10px; color: var(–accent2); letter-spacing: 0.5px; min-width: 44px; }
.meal-label { font-size: 9px; color: var(–muted); text-transform: uppercase; letter-spacing: 1px; flex: 1; }

.meal-tags { display: flex; gap: 4px; }
.tag {
font-size: 8px; padding: 2px 5px; border-radius: 2px;
letter-spacing: 0.5px; text-transform: uppercase;
}
.tag-transport { background: rgba(200,245,90,0.12); color: var(–accent); border: 1px solid rgba(200,245,90,0.3); }
.tag-prep { background: rgba(245,166,35,0.12); color: var(–accent2); border: 1px solid rgba(245,166,35,0.3); }
.tag-home { background: rgba(136,136,204,0.15); color: #aaaaee; border: 1px solid rgba(136,136,204,0.3); }

.meal-name {
font-size: 13px; color: var(–text); line-height: 1.3;
display: flex; align-items: center; gap: 6px;
padding-left: 52px;
}

.swap-btn {
background: none; border: none; color: var(–muted);
cursor: pointer; font-size: 12px; padding: 0; transition: color 0.15s; line-height: 1;
}
.swap-btn:hover { color: var(–accent); }

.meal-portions {
padding-left: 52px;
margin-top: 3px;
font-size: 10px;
color: var(–muted);
line-height: 1.5;
}

.fast-indicator {
margin-top: 12px; padding-top: 10px;
border-top: 1px dashed rgba(255,255,255,0.06);
font-size: 10px; color: var(–muted); letter-spacing: 1px;
}

.fast-bar { height: 3px; background: var(–border); margin-top: 6px; overflow: hidden; }
.fast-fill { height: 100%; background: linear-gradient(90deg, var(–accent2), var(–accent)); width: 33%; }

.summary {
max-width: 1200px; margin: 20px auto 0;
border: 1px solid var(–border); background: var(–surface);
padding: 16px 20px;
display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px;
}

.stat { text-align: center; }
.stat-value { font-family: ‘Syne’, sans-serif; font-weight: 800; font-size: 28px; color: var(–accent); line-height: 1; }
.stat-label { font-size: 10px; color: var(–muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

.modal-overlay {
display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
z-index: 100; align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.active { display: flex; }

.modal {
background: var(–surface); border: 1px solid var(–border);
padding: 24px; max-width: 420px; width: 100%; max-height: 80vh; overflow-y: auto;
}

.modal h3 { font-family: ‘Syne’, sans-serif; font-weight: 800; color: var(–accent); margin-bottom: 16px; font-size: 18px; }

.meal-option {
padding: 10px 12px; border: 1px solid var(–border);
margin-bottom: 8px; cursor: pointer; font-size: 12px; transition: all 0.15s;
}
.meal-option:hover { border-color: var(–accent); color: var(–accent); }
.meal-option .opt-portions { font-size: 10px; color: var(–muted); margin-top: 3px; }

.modal-close {
margin-top: 16px; width: 100%; padding: 10px;
background: transparent; border: 1px solid var(–border); color: var(–muted);
font-family: ‘DM Mono’, monospace; font-size: 12px; cursor: pointer;
text-transform: uppercase; letter-spacing: 1px;
}
.modal-close:hover { border-color: var(–muted); color: var(–text); }

@media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
</style>

</head>
<body>

<header>
  <h1>ESSENSPLAN</h1>
  <p>16:8 · Meal Prep · Tobi · 86kg → 79kg</p>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-dot dot-training"></div> Trainingstag Di/Do — 09:30–17:00</div>
  <div class="legend-item"><div class="legend-dot dot-normal"></div> Normaltag Mo/Mi/Fr — 10:30–19:00</div>
</div>

<div class="week-nav">
  <button onclick="changeWeek(-1)">◀ Vorwoche</button>
  <div class="week-label" id="weekLabel"></div>
  <button onclick="changeWeek(1)">Nächste ▶</button>
</div>

<div class="actions">
  <button class="btn primary" onclick="generateWeek()">⟳ Neu würfeln</button>
  <button class="btn" onclick="window.print()">↓ Drucken</button>
</div>

<div class="grid" id="planGrid"></div>
<div class="summary" id="summary"></div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <h3 id="modalTitle">Mahlzeit wählen</h3>
    <div id="modalOptions"></div>
    <button class="modal-close" onclick="closeModalDirect()">Abbrechen</button>

    { name: "Gemüse-Auflauf", portions: "500g Gemüse · 100g Schmelzkäse · 2 Eier · Kräuter", transport: false, prep: false },
    { name: "Chilli sin Carne", portions: "2 Dosen Bohnen/Linsen · 1 Dose Tomaten · Paprika · Reis 150g", transport: false, prep: false },
    { name: "Frühlingsrollen (gebacken)", portions: "6 Rollen · Asia-Gemüse · Sojasoße · Reis 150g", transport: false, prep: false },
    { name: "Kartoffelpüree mit Frikadellen", portions: "400g Kartoffeln · 3 Frikadellen (~240g) · Gemüse", transport: false, prep: false },

};

let currentWeekOffset = 0;
let currentPlan = [];
let swapTarget = null;

function getMonday(offset = 0) {
  const d = new Date();
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  d.setDate(diff + offset * 7);
  d.setHours(0,0,0,0);
  return d;
}

function formatDate(d) {
  return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' });
}

function getWeekNumber(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}

function pick(arr, exclude = []) {
  const filtered = arr.filter(x => !exclude.includes(x.name));
  const pool = filtered.length > 0 ? filtered : arr;
  return pool[Math.floor(Math.random() * pool.length)];
}

const DAYS_CONFIG = [
  { name: "Montag",     type: "normal" },
  { name: "Dienstag",   type: "training" },
  { name: "Mittwoch",   type: "normal" },
  { name: "Donnerstag", type: "training" },
  { name: "Freitag",    type: "normal" },
  { name: "Samstag",    type: "normal" },
  { name: "Sonntag",    type: "normal" },
];

function generateWeek() {
  const monday = getMonday(currentWeekOffset);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  document.getElementById('weekLabel').textContent =
    `KW ${getWeekNumber(monday)} · ${formatDate(monday)}–${formatDate(sunday)}`;

  const usedAbend = [];
  currentPlan = DAYS_CONFIG.map((day, i) => {
    const date = new Date(monday);
    date.setDate(monday.getDate() + i);
    const dateStr = formatDate(date);

    if (day.type === 'training') {
      return {
        ...day, date: dateStr,
        meals: [
          { time: '09:30', label: 'Frühstück', slotKey: 'fruehstueck', meal: pick(MEALS.fruehstueck) },
          { time: '12:30', label: 'Mittagessen', slotKey: 'mittagTraining', meal: pick(MEALS.mittagTraining) },
          { time: '15:30', label: 'Snack (letzter)', slotKey: 'snackTraining', meal: pick(MEALS.snackTraining) },
        ],
        fenster: '09:30 – 17:00',
        fasten: '16:30h'
      };
    } else {
      const abend = pick(MEALS.abendNormal, usedAbend);
      usedAbend.push(abend.name);
      if (usedAbend.length > 5) usedAbend.shift();
      return {
        ...day, date: dateStr,
        meals: [
          { time: '10:30', label: 'Frühstück', slotKey: 'fruehstueckNormal', meal: pick(MEALS.fruehstueckNormal) },
          { time: '12:30', label: 'Mittagessen', slotKey: 'mittagNormal', meal: pick(MEALS.mittagNormal) },
          { time: '18:30', label: 'Familienessen', slotKey: 'abendNormal', meal: abend },
        ],
        fenster: '10:30 – 19:00',
        fasten: '15:30h'
      };
    }
  });

  renderPlan();
}

function renderTags(meal) {
  let tags = '';
  if (meal.transport) tags += `<span class="tag tag-transport">🧺 Tupper</span>`;
  if (meal.prep) tags += `<span class="tag tag-prep">🍳 Vorkochen</span>`;
  if (!meal.transport && !meal.prep) tags += `<span class="tag tag-home">🏠 Zuhause</span>`;
  return tags;
}

function renderPlan() {
  const grid = document.getElementById('planGrid');
  grid.innerHTML = '';

  currentPlan.forEach((day, dayIdx) => {
    const card = document.createElement('div');
    card.className = `day-card ${day.type}`;

    const badgeClass = day.type === 'training' ? 'badge-training' : 'badge-normal';
    const badgeText = day.type === 'training' ? '🥋 Karate' : '🏠 Familie';

    card.innerHTML = `
      <div class="day-header">
        <div class="day-name">${day.name}</div>
        <div class="day-date">${day.date}</div>
        <div class="day-badge ${badgeClass}">${badgeText}</div>
      </div>
      ${day.meals.map((m, mIdx) => `
        <div class="meal-slot">
          <div class="meal-header">
            <div class="meal-time">${m.time}</div>
            <div class="meal-label">${m.label}</div>
            <div class="meal-tags">${renderTags(m.meal)}</div>
          </div>
          <div class="meal-name">
            ${m.meal.name}
            <button class="swap-btn" onclick="openSwap(${dayIdx}, ${mIdx})" title="Tauschen">⟳</button>
          </div>
          <div class="meal-portions">${m.meal.portions}</div>
        </div>
      `).join('')}
      <div class="fast-indicator">
        ⏱ Essen: ${day.fenster} · Fasten: ${day.fasten}
        <div class="fast-bar"><div class="fast-fill"></div></div>
      </div>
    `;
    grid.appendChild(card);
  });

  renderSummary();
}

function renderSummary() {
  const prepDays = currentPlan.filter(d => d.meals.some(m => m.meal.prep)).length;
  document.getElementById('summary').innerHTML = `
    <div class="stat"><div class="stat-value">7</div><div class="stat-label">Tage geplant</div></div>
    <div class="stat"><div class="stat-value">2</div><div class="stat-label">Trainingstage</div></div>
    <div class="stat"><div class="stat-value">21</div><div class="stat-label">Mahlzeiten</div></div>
    <div class="stat"><div class="stat-value">${prepDays}</div><div class="stat-label">Tage mit Vorkochen</div></div>
    <div class="stat"><div class="stat-value">~16h</div><div class="stat-label">Ø Fasten</div></div>
    <div class="stat"><div class="stat-value">~86→79</div><div class="stat-label">Ziel kg</div></div>
  `;
}

function openSwap(dayIdx, mealIdx) {
  swapTarget = { dayIdx, mealIdx };
  const day = currentPlan[dayIdx];
  const m = day.meals[mealIdx];
  const pool = MEALS[m.slotKey];

  document.getElementById('modalTitle').textContent = `${m.label} tauschen`;
  document.getElementById('modalOptions').innerHTML = pool
    .filter(x => x.name !== m.meal.name)
    .map(x => `
      <div class="meal-option" onclick="selectMeal(${pool.indexOf(x)}, '${m.slotKey}')">
        <div>${x.name} ${renderTags(x)}</div>
        <div class="opt-portions">${x.portions}</div>
      </div>
    `).join('');

  document.getElementById('modalOverlay').classList.add('active');
}

function selectMeal(idx, slotKey) {
  if (swapTarget) {
    currentPlan[swapTarget.dayIdx].meals[swapTarget.mealIdx].meal = MEALS[slotKey][idx];
    renderPlan();
  }
  closeModalDirect();
}

function changeWeek(dir) {
  currentWeekOffset += dir;
  generateWeek();
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('active');
  swapTarget = null;
}

generateWeek();
</script>

</body>
</html>
